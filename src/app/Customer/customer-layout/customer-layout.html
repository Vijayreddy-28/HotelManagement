<div class="app-layout">
  <header class="app-header">
    <div class="brand-wrapper">
      <div class="brand-logo">
        <i class="bi bi-buildings-fill"></i>
      </div>
      <h1 class="brand-name">The Canopy Retreat</h1>
    </div>

    <div class="header-actions">
      <button class="icon-action-btn" aria-label="Notifications">
        <i class="bi bi-bell"></i>
      </button>

      <div class="user-profile-dropdown">
        <div class="avatar">
          <i class="bi bi-person-circle"></i>
        </div>
        <div class="user-meta">
          <span class="user-name">{{ userName || 'Guest User' }}</span>
          <span class="user-role">Customer</span>
        </div>
      </div>
    </div>
  </header>

  <div class="app-viewport">
    <aside class="app-sidebar">
      <div class="sidebar-nav-wrapper">
        <div class="menu-header">CUSTOMER MANAGEMENT</div>

        <nav class="sidebar-nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a class="nav-link" routerLink="/customer/rooms" routerLinkActive="is-active">
                <i class="bi bi-door-open nav-icon"></i>
                <span class="nav-label">Room Booking</span>
              </a>
            </li>



            <li class="nav-item">
              <a class="nav-link" routerLink="/customer/food" routerLinkActive="is-active">
                <i class="bi bi-cup-hot nav-icon"></i>
                <span class="nav-label">Food Orders</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" routerLink="/customer/bills" routerLinkActive="is-active">
                <i class="bi bi-receipt nav-icon"></i>
                <span class="nav-label">Bills & Payments</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" routerLink="/customer/feedback" routerLinkActive="is-active">
                <i class="bi bi-chat-dots nav-icon"></i>
                <span class="nav-label">Feedback</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <div class="sidebar-footer">
        <button class="btn-logout" (click)="logout()" type="button">
          <i class="bi bi-box-arrow-right"></i>
          <span>Sign Out</span>
        </button>
      </div>
    </aside>

    <main class="app-content-workspace">
      <div class="workspace-container">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
