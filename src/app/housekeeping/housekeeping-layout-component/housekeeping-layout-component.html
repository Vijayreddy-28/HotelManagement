<div class="hk-layout">
  
  <!-- ===================== PREMIUM HEADER ===================== -->
  <header class="hk-navbar">
    <div class="navbar-container">
      
      <!-- Brand Logo & Name -->
      <div class="brand-wrapper">
        <div class="brand-logo">
          <i class="bi bi-buildings-fill"></i>
        </div>
        <div class="brand-text">
          <h1 class="brand-name">The Canopy Retreat</h1>
          <span class="brand-subtitle">Housekeeping Hub</span>
        </div>
      </div>

      <!-- Right Header Actions -->
      <div class="navbar-actions">
        
        <!-- User Profile Info -->
        <div class="profile-info">
          <div class="profile-avatar">
            {{ userName.charAt(0).toUpperCase() }}
            <span class="online-indicator"></span>
          </div>
          <div class="profile-details">
            <span class="user-display-name">{{ userName }}</span>
            <span class="user-display-role">Housekeeping Staff</span>
          </div>
        </div>

        <div class="actions-divider"></div>

        <!-- Sign Out Button directly in header -->
        <button class="btn-logout" (click)="logout()" type="button" title="Sign Out">
          <i class="bi bi-box-arrow-right"></i>
          <span>Sign Out</span>
        </button>

      </div>

    </div>
  </header>

  <!-- ===================== MAIN CONTENT WORKSPACE ===================== -->
  <main class="hk-content-workspace">
    <div class="workspace-container">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
