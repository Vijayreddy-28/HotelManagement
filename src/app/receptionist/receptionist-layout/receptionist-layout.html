<div class="app-layout">
  <!-- Header -->
  <header class="app-header">
    <div class="brand-wrapper">
      <button class="btn-menu-toggle d-md-none me-2" (click)="toggleSidebar()" type="button" aria-label="Toggle Menu">
        <i class="bi bi-list"></i>
      </button>
      <div class="brand-logo">
        <i class="bi bi-buildings-fill"></i>
      </div>
      <h1 class="brand-name">The Canopy Retreat</h1>
      <span class="badge bg-primary-subtle text-primary border ms-2 brand-badge-text">Staff Portal</span>
    </div>

    <div class="header-actions">
      <button class="icon-action-btn" aria-label="Notifications">
        <i class="bi bi-bell"></i>
      </button>

      <div class="user-profile-dropdown">
        <div class="avatar">
          <i class="bi bi-person-workspace"></i>
        </div>
        <div class="user-meta">
          <span class="user-name">{{ userName || 'Staff User' }}</span>
          <span class="user-role">Receptionist</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Viewport -->
  <div class="app-viewport">
    <!-- Sidebar -->
    <aside class="app-sidebar" [class.is-open]="isSidebarOpen">
      <div class="sidebar-nav-wrapper">
        <div class="menu-header">FRONT DESK MANAGEMENT</div>

        <nav class="sidebar-nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a class="nav-link" routerLink="/receptionist/dashboard" routerLinkActive="is-active">
                <i class="bi bi-speedometer2 nav-icon"></i>
                <span class="nav-label">Dashboard</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" routerLink="/receptionist/bookings" routerLinkActive="is-active">
                <i class="bi bi-journal-bookmark nav-icon"></i>
                <span class="nav-label">Bookings</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" routerLink="/receptionist/rooms" routerLinkActive="is-active">
                <i class="bi bi-door-open nav-icon"></i>
                <span class="nav-label">Rooms Status</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" routerLink="/receptionist/billing" routerLinkActive="is-active">
                <i class="bi bi-receipt nav-icon"></i>
                <span class="nav-label">Billing & Invoices</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" routerLink="/receptionist/housekeeping" routerLinkActive="is-active">
                <i class="bi bi-stars nav-icon"></i>
                <span class="nav-label">Housekeeping</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <button class="btn-logout" (click)="logout()" type="button">
          <i class="bi bi-box-arrow-right"></i>
          <span>Sign Out</span>
        </button>
      </div>
    </aside>

    <!-- Sidebar Backdrop Overlay -->
    <div class="sidebar-backdrop" *ngIf="isSidebarOpen" (click)="toggleSidebar()"></div>

    <!-- Workspace -->
    <main class="app-content-workspace">
      <div class="workspace-container">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
