<div class="container-fluid p-0">
  <div class="row g-0 vh-100">

    <!-- Left Image -->
    <div class="col-lg-7 d-none d-lg-block image-side">

      <div class="overlay">

        <div class="brand">
          <h2><i class="bi bi-buildings-fill"></i> The Canopy Retreat</h2>
        </div>

        <div class="bottom-content">

          <h1>Experience Comfort<br>Like Never Before</h1>

          <p>
            Sign in to manage your bookings, explore exclusive offers,
            and enjoy premium hospitality.
          </p>

          <div class="features">

            <div>
              <i class="bi bi-tag"></i>
              <span>Best Price</span>
            </div>

            <div>
              <i class="bi bi-shield-check"></i>
              <span>Secure Booking</span>
            </div>

            <div>
              <i class="bi bi-headset"></i>
              <span>24/7 Support</span>
            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- Login -->
    <div class="col-lg-5 d-flex align-items-center justify-content-center">

      <div class="login-card">

        <div class="text-end mb-5">
          New here?
          <a routerLink="/register">Create Account</a>
        </div>

        <h2 class="fw-bold">Welcome Back</h2>

        <p class="text-muted mb-4">
          Sign in to continue to your account
        </p>

        <form [formGroup]="registerForm" (ngSubmit)="Login()">

          <div class="mb-3">

            <label>Email Address</label>

            <div class="input-group">

              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>

              <input type="email" class="form-control" placeholder="name@gmail.com" formControlName="loginId">

            </div>

          </div>

          <div class="mb-4">

            <label>Password</label>

            <div class="input-group">

              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>

              <input type="password" class="form-control" placeholder="Enter password" formControlName="password">

            </div>

          </div>

          <button class="btn btn-primary w-100 login-btn" [disabled]="registerForm.invalid">

            Sign In

          </button>

        </form>

      </div>

    </div>

  </div>
</div>
